version: 2

sources:
  - name: dbt_databricks                # Name used in your source() function
    description: "Raw data from our e-commerce platform"
    database: docker_dbt              # The database name in your warehouse
    schema: staging           # The schema name in your warehouse
    loader: stitch                  # Optional: tool used to load the data

    tables:
      - name: the2014inc
        description: "Inc table"
        
      - name: orders
        description: "Raw order information"
        freshness:                  # Optional: monitors data latency
          warn_after:
            count: 12
            period: hour
          error_after:
            count: 24
            period: hour
        loaded_at_field: order_date
